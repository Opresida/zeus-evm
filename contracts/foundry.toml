[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.27"
optimizer = true
# optimizer_runs ajustado pra 200 (default Solidity) na v8 — privilegia SIZE em vez de gas.
# v6/v7 usavam 1_000_000 (otimizava gas, mas inflava bytecode). v8 com split em 3 contratos
# já tem headroom de gas (1 call externa pro BribeManager = ~700 gas extra, irrelevante).
optimizer_runs = 200
via_ir = true
evm_version = "cancun"

# Otimizacao agressiva pra contratos hot-path (executor)
[profile.default.optimizer_details]
yul = true

# Tests legacy do ZeusExecutor v6/v7 (monolítico) FORAM REMOVIDOS na v8.
# Suites novas em test/BribeManager.t.sol + test/ZeusLiquidator.t.sol + test/ZeusArbExecutor.t.sol

[profile.ci]
fuzz = { runs = 10_000 }
invariant = { runs = 1_000, depth = 50 }

[rpc_endpoints]
base = "${BASE_RPC_HTTP}"
base_sepolia = "${BASE_SEPOLIA_RPC_HTTP}"
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_HTTP}"
optimism_sepolia = "${OPTIMISM_SEPOLIA_RPC_HTTP}"

# Etherscan v2 unificou chains numa só API key — BASESCAN_API_KEY é usado pra todas.
[etherscan]
base = { key = "${BASESCAN_API_KEY}", chain = 8453 }
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532 }
arbitrum_sepolia = { key = "${BASESCAN_API_KEY}", chain = 421614 }
optimism_sepolia = { key = "${BASESCAN_API_KEY}", chain = 11155420 }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
